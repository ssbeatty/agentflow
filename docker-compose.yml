# docker-compose.yml — production stack (pulls the published image)
#
#   docker compose pull && docker compose up -d   (default: app + postgres)
#   DATABASE_URL=sqlite:////app/backend/data/agentflow.db \
#     docker compose up -d app --no-deps          (single container, no postgres)
#
# Pulls ghcr.io/ssbeatty/agentflow:latest by default. Pin a version or use a
# locally-built image via the AGENTFLOW_IMAGE env var, e.g.
#   AGENTFLOW_IMAGE=ghcr.io/ssbeatty/agentflow:v1.2.3 docker compose up -d
# To build from source instead, run `docker build -t agentflow:local .` and set
# AGENTFLOW_IMAGE=agentflow:local. Override other env via .env or --env-file.

services:
  app:
    image: ${AGENTFLOW_IMAGE:-ghcr.io/ssbeatty/agentflow:latest}
    container_name: agentflow-app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://agentflow:agentflow@postgres:5432/agentflow}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      DATA_DIR: /app/backend/data/scripts
      APP_ENV: ${APP_ENV:-production}
      # Admin auth — signing secret persists in the data volume if left blank.
      SECRET_KEY: ${SECRET_KEY:-}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Timezone the cron scheduler interprets crontab expressions in. Leave
      # both unset and cron fires in UTC. Either knob works (SCHEDULER_TIMEZONE
      # wins; TZ also shifts the process' local time). The image bundles tzdata
      # so IANA names resolve.  e.g. TZ=Asia/Shanghai
      TZ: ${TZ:-}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # persists per-script venvs + sqlite db (if used)
      - app-data:/app/backend/data
    depends_on:
      postgres:
        condition: service_healthy
        required: false   # ignored when postgres profile isn't active
    networks: [agentflow]

  postgres:
    image: postgres:16-alpine
    container_name: agentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentflow}
      POSTGRES_DB: ${POSTGRES_DB:-agentflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentflow}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [agentflow]

volumes:
  app-data:
  postgres-data:

networks:
  agentflow:
    driver: bridge
