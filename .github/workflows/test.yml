name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    # Cap the job so a hung test (e.g. a process that refuses to exit because a
    # non-daemon thread is still alive) fails in minutes instead of hanging until
    # the 6-hour default. The whole suite runs well under this locally.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install bubblewrap
        # So the execution filesystem-jail test actually runs here instead of
        # skipping. If the runner blocks unprivileged namespaces the test's own
        # probe skips it gracefully — it never fails CI.
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        working-directory: backend
        run: python -m pytest
