# Alembic config for AgentFlow.
#
# The DB URL is NOT set here - env.py pulls it from the app settings
# (app.database.DATABASE_URL) so a single source of truth (DATABASE_URL env)
# drives both the app and migrations, for sqlite AND postgres alike.
#
# At runtime migrations are applied programmatically from app.main's lifespan
# (see app/migrate.py). This file exists mainly so the `alembic` CLI works for
# authoring new revisions:  cd backend && alembic revision --autogenerate -m "..."

[alembic]
script_location = alembic
prepend_sys_path = .
# Use a plain, filesystem-friendly revision id + a readable slug.
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
